version: "3.9"
services:
  app:
    build: .
    deploy:
      replicas: 2
    expose:
      - "5000"
    networks:
      - backend
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=app
      - REDIS_LOCAL=false
      - PISTON_URL=http://piston:2000
    depends_on:
      - redis
      - worker
      - piston

  redis:
    image: redis:alpine
    networks:
      - backend

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/bullmq/schedulers/subscriptionScheduler.js
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=scheduler
      - REDIS_LOCAL=false
    networks:
      - backend
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/bullmq/workers/subscriptionWorker.js
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=worker
      - REDIS_LOCAL=false
    networks:
      - backend

  piston:
    image: ghcr.io/engineer-man/piston
    privileged: true
    volumes:
      - piston_data:/piston
    ports:
      - "2000:2000"
    networks:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "5000:80"
    depends_on:
      - app
    networks:
      - backend

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki
    networks:
      - backend

  frontend:
    build: ../client
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
      - API_BASE_URL=http://app:5000/api
    depends_on:
      - app
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  piston_data:
