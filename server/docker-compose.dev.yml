version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./src:/app/src
    ports:
      - "5000:5000"
    networks:
      - backend
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=app
      - REDIS_LOCAL=false
      - PISTON_URL=http://piston:2000
    depends_on:
      - redis
      - piston

  redis:
    image: redis:alpine
    networks:
      - backend

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ts-node-dev --respawn --transpile-only src/bullmq/schedulers/subscriptionScheduler.ts
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=scheduler
      - REDIS_LOCAL=false
    networks:
      - backend
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ts-node-dev --respawn --transpile-only src/bullmq/workers/subscriptionWorker.ts
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - SERVICE_NAME=worker
      - REDIS_LOCAL=false
    networks:
      - backend

  piston:
    image: ghcr.io/engineer-man/piston
    privileged: true
    volumes:
      - piston_data:/piston
    ports:
      - "2000:2000"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  piston_data:
